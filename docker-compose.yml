services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: camagru-php
    environment:
      DB_DRIVER: ${DB_DRIVER:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-bookdb}
      DB_USER: ${DB_USER:-user}
      DB_PASS: ${DB_PASS:-password}
      BASE_URL: ${BASE_URL:-http://localhost:8080/}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003}
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: camagru-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
    depends_on:
      - php
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: camagru-db
    environment:
      POSTGRES_DB: ${DB_NAME:-bookdb}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-bookdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
